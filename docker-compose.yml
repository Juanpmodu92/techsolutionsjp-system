services:
  postgres:
    image: postgres:16
    container_name: techsolutionsjp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: techsolutionsjp_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin1234
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: